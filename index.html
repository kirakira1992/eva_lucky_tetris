<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EVA Lucky Tetris</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <div class="game-area">
      <canvas id="gameCanvas" width="300" height="600"></canvas>
      <div class="previews">
        <div class="preview-box">
          <h3>Hold</h3>
          <canvas id="holdCanvas" width="120" height="120"></canvas>
        </div>
        <div class="preview-box">
          <h3>Next</h3>
          <canvas id="nextCanvas" width="120" height="120"></canvas>
        </div>
      </div>
    </div>
    <aside class="panel">
      <h2 class="game-title">EVA Lucky Tetris</h2>
      <div id="lineClearMessage" class="line-clear-message" aria-hidden="true">Lucky is proud of you 🐶✨</div>
      <div class="panel-section">
        <h3>Joy Points</h3>
        <p id="score">0</p>
      </div>
      <div class="panel-section">
        <h3>Level</h3>
        <p id="level">1</p>
      </div>
      <div class="panel-section">
        <h3>Happy Lines</h3>
        <p id="lines">0</p>
      </div>
      <div class="panel-section keys">
        <h3>按键说明</h3>
        <p>← → 左右移动</p>
        <p>↓ 加速下落</p>
        <p>空格 硬降</p>
        <p>↑ / X 旋转</p>
        <p>P 暂停</p>
        <p>R 重开</p>
        <p>C Hold</p>
      </div>
    </aside>
  </div>
  <div id="gameOverOverlay" class="game-over-overlay" aria-hidden="true">
    <p class="game-over-text">关注 Eva，永远留在牌桌上 ♡</p>
    <button type="button" id="restartBtn" class="restart-btn">重新开始</button>
  </div>
  <script src="main.js"></script>
  <script>
    (function () {
      var btn = document.getElementById('restartBtn');
      if (btn) btn.addEventListener('click', function () {
        if (window.evaTetrisRestart) window.evaTetrisRestart();
      });
    })();
  </script>
</body>
</html>
